<!-- West Bay Chat Widget -->
<div id="wb-chat-btn" onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;background:#cc0000;color:white;border-radius:50px;padding:15px 25px;cursor:pointer;font-family:Arial;font-size:16px;font-weight:bold;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:9999;">
  💬 Chat with us
</div>

<div id="wb-chat-box" style="display:none;position:fixed;bottom:80px;right:20px;width:350px;height:500px;background:white;border-radius:15px;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;font-family:Arial;flex-direction:column;">
  <div style="background:#cc0000;color:white;padding:15px;border-radius:15px 15px 0 0;font-weight:bold;">
    🔧 West Bay Appliance Repair
    <span onclick="toggleChat()" style="float:right;cursor:pointer;font-size:20px;">×</span>
  </div>
  <div id="wb-messages" style="flex:1;overflow-y:auto;padding:15px;height:350px;"></div>
  <div style="padding:10px;border-top:1px solid #eee;display:flex;gap:10px;">
    <input id="wb-input" type="text" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;outline:none;font-size:14px;">
    <button onclick="sendMessage()" style="background:#cc0000;color:white;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;">→</button>
  </div>
</div>

<script>
let chatHistory = [];
let isOpen = false;

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('wb-chat-box').style.display = isOpen ? 'flex' : 'none';
  if (isOpen && chatHistory.length === 0) {
    addMessage('bot', 'Hi! I\'m the West Bay Appliance Repair assistant. How can I help you today? 🔧');
  }
}

function addMessage(sender, text) {
  const div = document.getElementById('wb-messages');
  const msg = document.createElement('div');
  msg.style.cssText = `margin:8px 0;padding:10px 14px;border-radius:15px;max-width:80%;font-size:14px;line-height:1.4;${sender==='user'?'background:#cc0000;color:white;margin-left:auto;':'background:#f0f0f0;color:#333;'}`;
  msg.textContent = text;
  div.appendChild(msg);
  div.scrollTop = div.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('wb-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  addMessage('bot', '...');
  
  try {
    const response = await fetch('https://westbay-chat-production.up.railway.app/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, history: chatHistory})
    });
    const data = await response.json();
    document.getElementById('wb-messages').lastChild.textContent = data.reply;
    chatHistory = data.messages;
  } catch(e) {
    document.getElementById('wb-messages').lastChild.textContent = 'Sorry, try again or call (941) 500-0808';
  }
}
</script>
